<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Solver Hub</title>
  <meta name="description" content="Fast, free tools to help solve Wordle, Octordle, and other word puzzles." />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    header {
      background: white;
      padding: 16px 24px;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      padding: 24px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 2.2rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .tag {
      margin-top: 16px;
      display: inline-block;
      padding: 6px 12px;
      background: #eef2ff;
      border-radius: 999px;
      font-size: 0.9rem;
      color: #333;
    }
  </style>
</head>

<body>

  <header>
    Puzzle Solver Hub
  </header>

  <div class="container">
    <h1>Fast, Free Puzzle Solvers</h1>

    <p>
      Get help solving Wordle, Octordle, and other word puzzles.
      Tools and strategy guides are coming soon.
    </p>

    <a class="button" href="#">
      Coming Soon
    </a>

    <div class="tag">
      First tools launching soon
    </div>
  </div>

</body>
</html>
