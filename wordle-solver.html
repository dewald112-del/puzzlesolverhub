<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Puzzle Solver Hub - Wordle Solver</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: white;
  padding: 14px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
}

main {
  max-width: 520px;
  margin: auto;
  padding: 12px;
}

.card {
  background: white;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
}

h2 { margin: 0 0 10px; font-size: 1.2rem; }
h3 { margin: 12px 0 6px; font-size: 1rem; }

.position-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 2px solid #ccc;
  text-align: center;
  font-weight: bold;
}

input.green { border-color: #22c55e; background: #ecfdf5; }
input.yellow { border-color: #facc15; background: #fefce8; }
input.gray { border-color: #9ca3af; background: #f3f4f6; text-align: left; }

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #4f46e5;
  color: white;
}

.strategy {
  background: #f9fafb;
  border: 1px solid #ddd;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  font-size: 0.9rem;
}

/* Suggestions */
.suggestions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.suggestion-chip {
  background: #eef2ff;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
  position: relative;
}

.suggestion-chip.best {
  background: #dcfce7;
}

.suggestion-label {
  font-size: 10px;
  opacity: 0.7;
  display: block;
}

/* Copy feedback */
.copy-feedback {
  position: absolute;
  bottom: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: green;
  opacity: 0;
}

.suggestion-chip.copied .copy-feedback {
  opacity: 1;
}

/* Results */
.results {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 6px;
  margin-top: 10px;
  max-height: 220px;
  overflow: auto;
}

.word {
  background: #eee;
  padding: 8px;
  text-align: center;
  border-radius: 8px;
}

/* Desktop upgrade */
@media (min-width: 800px) {
  main { max-width: 1000px; }

  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 16px;
  }
}
</style>
</head>

<body>

<header>
<div>Puzzle Solver Hub</div>
<a href="/">Home</a>
</header>

<main>

<div class="layout">

<div class="card">
<h2>Wordle Helper</h2>

<h3>Green</h3>
<div class="position-row">
<input class="g green"><input class="g green"><input class="g green"><input class="g green"><input class="g green">
</div>

<h3>Yellow</h3>
<div class="position-row">
<input class="y yellow"><input class="y yellow"><input class="y yellow"><input class="y yellow"><input class="y yellow">
</div>

<h3>Gray</h3>
<input id="gray" class="gray" placeholder="rstlne">

<button onclick="solve()">Update</button>
</div>

<div class="card">
<h2>Best Guesses</h2>
<div id="strategy" class="strategy"></div>

<div id="suggestions" class="suggestions"></div>

<h3>Results (<span id="count">0</span>)</h3>
<div id="results" class="results"></div>
</div>

</div>

</main>

<script>

const WORDS = ["cigar","rebut","sissy","humph","awake","blush","focal","evade","naval","serve","heath","dwarf","model","karma","stink","grade","quiet","bench","abate","feign","major","death","fresh","crust","stool","colon","abase","marry","react","batty"];

function clean(v){ return v.toLowerCase().replace(/[^a-z]/g,""); }

function getRules(){
let g=[...document.querySelectorAll(".g")].map(x=>clean(x.value));
let y=[...document.querySelectorAll(".y")].map(x=>clean(x.value));
let gray=clean(document.getElementById("gray").value);
return {g,y,gray};
}

function match(w,r){
for(let i=0;i<5;i++){ if(r.g[i] && w[i]!=r.g[i]) return false; }

for(let i=0;i<5;i++){
for(let l of r.y[i]){
if(w[i]==l) return false;
if(!w.includes(l)) return false;
}
}

for(let l of r.gray){
if(!r.y.join("").includes(l) && !r.g.includes(l)){
if(w.includes(l)) return false;
}
}
return true;
}

function rank(words){
let f={};
words.forEach(w=>{
[...new Set(w)].forEach(l=>f[l]=(f[l]||0)+1);
});

return words.map(w=>{
let score=[...new Set(w)].reduce((s,l)=>s+(f[l]||0),0);
return {w,score};
}).sort((a,b)=>b.score-a.score);
}

function strategy(n){
if(n>20) return "Explore new letters";
if(n>10) return "Narrow down";
if(n>5) return "Close in";
return "Very close";
}

function copyWord(word, el){
navigator.clipboard.writeText(word);
el.classList.add("copied");

let fb=document.createElement("div");
fb.className="copy-feedback";
fb.innerText="Copied";
el.appendChild(fb);

setTimeout(()=>{ el.classList.remove("copied"); fb.remove(); },800);
}

function solve(){

let r=getRules();
let matches=WORDS.filter(w=>match(w,r));
let ranked=rank(matches);

document.getElementById("count").innerText=matches.length;
document.getElementById("strategy").innerText=strategy(matches.length);

let s=document.getElementById("suggestions");
s.innerHTML="";

ranked.slice(0,4).forEach((obj,i)=>{
let d=document.createElement("div");
d.className="suggestion-chip"+(i==0?" best":"");

let label=document.createElement("span");
label.className="suggestion-label";
label.innerText=i==0?"Best":"Guess";

d.appendChild(label);
d.append(obj.w);

d.onclick=()=>copyWord(obj.w,d);

s.appendChild(d);
});

let res=document.getElementById("results");
res.innerHTML="";
matches.slice(0,60).forEach(w=>{
let d=document.createElement("div");
d.className="word";
d.innerText=w;
res.appendChild(d);
});
}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",()=>{
i.value=clean(i.value);
solve();
});
});

solve();

</script>

</body>
</html>
