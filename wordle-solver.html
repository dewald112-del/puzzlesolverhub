<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Solver Hub - Wordle Solver</title>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { background:white; padding:16px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; }
    main { max-width:1100px; margin:20px auto; padding:0 12px; }

    .layout { display:grid; grid-template-columns:420px 1fr; gap:16px; }
    .card { background:white; padding:20px; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,.06); }

    .position-row { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
    input { padding:12px; border-radius:8px; border:2px solid #ccc; font-weight:bold; text-align:center; text-transform:lowercase; }
    input.green { border-color:#22c55e; background:#ecfdf5; }
    input.yellow { border-color:#facc15; background:#fefce8; }
    input.gray { border-color:#9ca3af; background:#f3f4f6; text-align:left; }

    button { margin-top:12px; padding:10px 14px; border:none; border-radius:8px; background:#4f46e5; color:white; cursor:pointer; }

    .suggestions { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .suggestion-chip { padding:10px 14px; border-radius:999px; background:#eef2ff; font-weight:bold; }
    .suggestion-chip.best { background:#dcfce7; }

    .suggestion-label { display:block; font-size:11px; opacity:.7; }

    .strategy { background:#f9fafb; border:1px solid #ddd; padding:10px; border-radius:10px; margin-bottom:10px; }

    .results { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:8px; margin-top:10px; }
    .word { background:#eee; padding:8px; text-align:center; border-radius:8px; }

    @media(max-width:900px){
      .layout { grid-template-columns:1fr; }
    }
  </style>
</head>

<body>
<header>
  <div>Puzzle Solver Hub</div>
  <a href="/">Back</a>
</header>

<main>

<div class="layout">

<div class="card">
<h2>Wordle Helper</h2>

<h3>Green (Correct Position)</h3>
<div class="position-row">
<input class="green g"><input class="green g"><input class="green g"><input class="green g"><input class="green g">
</div>

<h3>Yellow (Wrong Spot)</h3>
<div class="position-row">
<input class="yellow y"><input class="yellow y"><input class="yellow y"><input class="yellow y"><input class="yellow y">
</div>

<h3>Gray (Not in Word)</h3>
<input id="gray" class="gray" placeholder="rstlne">

<button onclick="solve()">Update</button>
</div>

<div class="card">
<h2>Best Guesses</h2>
<div id="strategy" class="strategy">Start entering letters.</div>
<div id="suggestions" class="suggestions"></div>

<h3>Results (<span id="count">0</span>)</h3>
<div id="results" class="results"></div>
</div>

</div>

</main>

<script>

const WORDS = ["cigar","rebut","sissy","humph","awake","blush","focal","evade","naval","serve","heath","dwarf","model","karma","stink","grade","quiet","bench","abate","feign","major","death","fresh","crust","stool","colon","abase","marry","react","batty","pride","floss","helix","croak","staff","paper","unfed","whelp","trawl","outdo","adobe","crazy","sower","repay","digit","crate","cluck","spike","mimic","pound","maxim","linen","unmet","flesh","booby","forth","first","stand","belly","ivory","seedy","print","yearn","drain","bribe","stout","panel","crass","flume","offal","agree","error","swirl","argue","bleed","delta","flick","totem","wooer","front","shrub","parry","biome","lapel","start","greet","goner","golem","lusty","loopy","round","audit","lying","gamma","labor","islet","civic","forge","corny","moult","basic","salad","agate","spicy","spray","essay"];

function clean(v){return v.toLowerCase().replace(/[^a-z]/g,"");}

function getRules(){
let g=[...document.querySelectorAll(".g")].map(x=>clean(x.value));
let y=[...document.querySelectorAll(".y")].map(x=>clean(x.value));
let gray=clean(document.getElementById("gray").value);

return {g,y,gray};
}

function match(w,r){
for(let i=0;i<5;i++){ if(r.g[i] && w[i]!=r.g[i]) return false; }

for(let i=0;i<5;i++){
for(let l of r.y[i]){
if(w[i]==l) return false;
if(!w.includes(l)) return false;
}
}

for(let l of r.gray){
if(!r.y.join("").includes(l) && !r.g.includes(l)){
if(w.includes(l)) return false;
}
}

return true;
}

function rank(words){
let f={};
words.forEach(w=>{
[...new Set(w)].forEach(l=>f[l]=(f[l]||0)+1);
});

return words.map(w=>{
let score=[...new Set(w)].reduce((s,l)=>s+(f[l]||0),0);
return {w,score};
}).sort((a,b)=>b.score-a.score);
}

function strategy(n){
if(n>40) return "Explore: use new letters";
if(n>15) return "Narrowing: mix new + known letters";
if(n>5) return "Close: start targeting solutions";
return "Very close: pick likely answer";
}

function solve(){

let r=getRules();

let matches=WORDS.filter(w=>match(w,r));
let ranked=rank(matches);

document.getElementById("count").innerText=matches.length;
document.getElementById("strategy").innerText=strategy(matches.length);

let s=document.getElementById("suggestions");
s.innerHTML="";

ranked.slice(0,5).forEach((obj,i)=>{
let d=document.createElement("div");
d.className="suggestion-chip"+(i==0?" best":"");

let label=document.createElement("span");
label.className="suggestion-label";
label.innerText=i==0?"Best Info":matches.length<10?"Likely":"Strong";

d.appendChild(label);
d.append(obj.w);
s.appendChild(d);
});

let res=document.getElementById("results");
res.innerHTML="";
matches.slice(0,100).forEach(w=>{
let d=document.createElement("div");
d.className="word";
d.innerText=w;
res.appendChild(d);
});
}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",()=>{
i.value=clean(i.value);
solve();
});
});

solve();

</script>

</body>
</html>
