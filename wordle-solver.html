<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Puzzle Solver Hub - Wordle Solver</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
  color: #222;
  overflow-x: hidden;
}

header {
  background: white;
  padding: 12px 14px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 0.95rem;
}

header a {
  color: #4f46e5;
  text-decoration: none;
}

main {
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
  padding: 10px;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,.05);
}

h2 {
  margin: 0 0 8px;
  font-size: 1.15rem;
}

h3 {
  margin: 10px 0 5px;
  font-size: 0.95rem;
}

.small-note {
  margin: 0 0 6px;
  font-size: 0.82rem;
  color: #666;
}

.position-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  width: 100%;
}

input {
  width: 100%;
  min-width: 0;
  height: 42px;
  padding: 4px;
  border-radius: 7px;
  border: 2px solid #ccc;
  text-align: center;
  font-size: 1rem;
  font-weight: bold;
  text-transform: lowercase;
}

input.green {
  border-color: #22c55e;
  background: #ecfdf5;
}

input.yellow {
  border-color: #facc15;
  background: #fefce8;
}

input.gray {
  height: 40px;
  border-color: #9ca3af;
  background: #f3f4f6;
  text-align: left;
  padding-left: 10px;
  font-weight: normal;
}

.button-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.primary {
  background: #4f46e5;
  color: white;
}

.secondary {
  background: #e5e7eb;
  color: #222;
}

.strategy {
  background: #f9fafb;
  border: 1px solid #ddd;
  padding: 9px;
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 0.88rem;
}

.suggestions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 7px;
}

.suggestion-chip {
  background: #eef2ff;
  padding: 9px 6px;
  border-radius: 10px;
  font-weight: bold;
  text-align: center;
  cursor: pointer;
  position: relative;
  font-size: 0.95rem;
}

.suggestion-chip.best {
  background: #dcfce7;
}

.suggestion-label {
  display: block;
  font-size: 0.68rem;
  opacity: 0.75;
  margin-bottom: 2px;
}

.copy-feedback {
  position: absolute;
  bottom: -14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.65rem;
  color: green;
}

.results-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
  margin-top: 10px;
}

.results-header h3 {
  margin: 0;
}

.results-header span {
  font-size: 0.85rem;
  color: #666;
}

.results {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
  gap: 6px;
  max-height: 170px;
  overflow-y: auto;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #e5e7eb;
}

.word {
  background: #eee;
  padding: 7px 4px;
  text-align: center;
  border-radius: 7px;
  font-size: 0.9rem;
  font-weight: bold;
}

@media (min-width: 850px) {
  main {
    max-width: 1100px;
    padding: 18px;
  }

  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 16px;
    align-items: start;
  }

  .card {
    padding: 18px;
  }

  .results {
    max-height: 420px;
  }
}
</style>
</head>

<body>

<header>
  <div><strong>Puzzle Solver Hub</strong></div>
  <a href="/">Home</a>
</header>

<main>
  <div class="layout">

    <section class="card">
      <h2>Wordle Helper</h2>

      <h3>Green</h3>
      <p class="small-note">Correct letter, correct spot.</p>
      <div class="position-row">
        <input class="g green" maxlength="1">
        <input class="g green" maxlength="1">
        <input class="g green" maxlength="1">
        <input class="g green" maxlength="1">
        <input class="g green" maxlength="1">
      </div>

      <h3>Yellow</h3>
      <p class="small-note">Letter is in the word, but not in that spot.</p>
      <div class="position-row">
        <input class="y yellow">
        <input class="y yellow">
        <input class="y yellow">
        <input class="y yellow">
        <input class="y yellow">
      </div>

      <h3>Gray</h3>
      <input id="gray" class="gray" placeholder="Letters not in answer">

      <div class="button-row">
        <button class="primary" id="updateBtn">Update</button>
        <button class="secondary" id="resetBtn">Reset</button>
      </div>
    </section>

    <section class="card">
      <h2>Best Guesses</h2>
      <div id="strategy" class="strategy">Start entering letters.</div>
      <div id="suggestions" class="suggestions"></div>

      <div class="results-header">
        <h3>Results</h3>
        <span><span id="count">0</span> matches</span>
      </div>

      <div id="results" class="results"></div>
    </section>

  </div>
</main>

let solveTimer;

function clean(value) {
  return value.toLowerCase().replace(/[^a-z]/g, "");
}

function getRules() {
  const greenInputs = [...document.querySelectorAll(".g")];
  const yellowInputs = [...document.querySelectorAll(".y")];

  const correct = greenInputs.map(input => clean(input.value).slice(0, 1));
  const misplaced = yellowInputs.map(input => clean(input.value));

  let requiredLetters = "";
  misplaced.forEach(group => requiredLetters += group);
  correct.forEach(letter => requiredLetters += letter);

  const excludedLetters = clean(document.getElementById("gray").value);

  return { correct, misplaced, requiredLetters, excludedLetters };
}

function wordMatches(word, rules) {
  const { correct, misplaced, requiredLetters, excludedLetters } = rules;

  for (let i = 0; i < 5; i++) {
    if (correct[i] && word[i] !== correct[i]) return false;
  }

  for (let i = 0; i < 5; i++) {
    for (const letter of misplaced[i]) {
      if (word[i] === letter) return false;
      if (!word.includes(letter)) return false;
    }
  }

  for (const letter of requiredLetters) {
    if (!word.includes(letter)) return false;
  }

  for (const letter of excludedLetters) {
    if (!requiredLetters.includes(letter) && word.includes(letter)) return false;
  }

  return true;
}

function rankSuggestions(words) {
  const frequency = {};

  for (const word of words) {
    for (const letter of new Set(word)) {
      frequency[letter] = (frequency[letter] || 0) + 1;
    }
  }

  return [...words]
    .map(word => {
      const score = [...new Set(word)].reduce((sum, letter) => sum + (frequency[letter] || 0), 0);
      return { word, score };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 4)
    .map(item => item.word);
}

function getStrategy(count) {
  if (count === 0) return "No matches. Check for conflicting clues.";
  if (count > 40) return "Explore: try common unused letters.";
  if (count > 15) return "Narrowing: test likely letters and positions.";
  if (count > 5) return "Close: focus on likely solutions.";
  return "Very close: one of these may be the answer.";
}

function copyWord(word, element) {
  navigator.clipboard.writeText(word);

  const old = element.querySelector(".copy-feedback");
  if (old) old.remove();

  const feedback = document.createElement("div");
  feedback.className = "copy-feedback";
  feedback.textContent = "Copied";
  element.appendChild(feedback);

  setTimeout(() => feedback.remove(), 750);
}

function render(words) {
  document.getElementById("count").textContent = words.length;
  document.getElementById("strategy").textContent = getStrategy(words.length);

  const suggestions = document.getElementById("suggestions");
  suggestions.innerHTML = "";

  const top = rankSuggestions(words);

  if (top.length === 0) {
    suggestions.innerHTML = '<div class="small-note">No suggestions yet.</div>';
  } else {
    top.forEach((word, index) => {
      const chip = document.createElement("div");
      chip.className = index === 0 ? "suggestion-chip best" : "suggestion-chip";

      const label = document.createElement("span");
      label.className = "suggestion-label";
      label.textContent = index === 0 ? "Best" : words.length <= 10 ? "Likely" : "Strong";

      chip.appendChild(label);
      chip.append(word);
      chip.addEventListener("click", () => copyWord(word, chip));

      suggestions.appendChild(chip);
    });
  }

  const results = document.getElementById("results");
  results.innerHTML = "";

  if (words.length === 0) {
    results.innerHTML = '<div class="small-note">No matching words found.</div>';
    return;
  }

  words.slice(0, 80).forEach(word => {
    const div = document.createElement("div");
    div.className = "word";
    div.textContent = word;
    results.appendChild(div);
  });
}

function solve() {
  const rules = getRules();
  const matches = WORDS.filter(word => wordMatches(word, rules));
  render(matches);
}

function scheduleSolve() {
  clearTimeout(solveTimer);
  solveTimer = setTimeout(solve, 120);
}

function resetSolver() {
  document.querySelectorAll("input").forEach(input => input.value = "");
  solve();
  document.querySelector(".g").focus();
}

document.querySelectorAll("input").forEach(input => {
  input.addEventListener("input", () => {
    input.value = clean(input.value);

    if (input.classList.contains("g") && input.value.length === 1) {
      const greenInputs = [...document.querySelectorAll(".g")];
      const index = greenInputs.indexOf(input);
      if (index >= 0 && index < greenInputs.length - 1) {
        greenInputs[index + 1].focus();
      }
    }

    scheduleSolve();
  });
});

document.getElementById("updateBtn").addEventListener("click", solve);
document.getElementById("resetBtn").addEventListener("click", resetSolver);

solve();
